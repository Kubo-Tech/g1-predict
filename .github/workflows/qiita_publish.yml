name: Qiita Publish

on:
  push:
    branches: [main]
    paths:
      - 'public/**/*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Publish changed articles
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
        run: |
          CHANGED=$(git -c core.quotepath=false diff --name-only HEAD~1 HEAD -- 'public/**/*.md')
          while IFS= read -r f; do
            python scripts/qiita_publish.py "$f"
          done <<< "$CHANGED"

      - name: Commit .qiita_ids.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'public/**/.qiita_ids.json'
          git diff --staged --quiet || git commit -m "chore: update .qiita_ids.json"
          git push
