name: Qiita Publish

on:
  push:
    branches: [main]
    paths:
      - 'public/**/*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Publish changed articles
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          fi
          CHANGED=$(git -c core.quotepath=false diff --name-only --diff-filter=AM "$BEFORE" "$SHA" -- 'public/**/*.md')
          while IFS= read -r f; do
            [ -n "$f" ] && python scripts/qiita_publish.py "$f"
          done <<< "$CHANGED"

      - name: Commit .qiita_ids.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'public/**/.qiita_ids.json'
          git diff --staged --quiet || git commit -m "chore: update .qiita_ids.json"
          git push
